<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء ملف قضية | منصة مُحكَّم</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.rawgit.com/kbwood/calendars/2.1.0/css/jquery.calendars.picker.css" rel="stylesheet">

    <style>
        :root { 
            --primary: #1e293b;   
            --accent: #c5a059;    
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #cbd5e1;
            --danger: #e11d48;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Naskh Arabic', serif; }
        
        body { background-color: var(--bg); color: var(--primary); padding: 40px 0; }

        .form-container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .form-header { border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        
        .form-section { margin-bottom: 40px; padding: 25px; border: 1px solid #f1f5f9; border-radius: 10px; background: #fff; position: relative; }
        .form-section h3 { font-size: 16px; margin-bottom: 20px; color: var(--primary); border-right: 4px solid var(--accent); padding-right: 10px; font-weight: 800; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .field label { font-size: 13px; font-weight: 700; }
        
        .field input, .field select { 
            padding: 12px; border: 1px solid var(--border); border-radius: 8px; outline: none; font-size: 14px; background: #fff; width: 100%; transition: 0.3s;
        }
        
        /* حالة الخطأ (خانات فارغة) */
        .field input.error, .field select.error { border-color: var(--danger) !important; background-color: #fff1f2; }

        .hijri-picker { background: #fff url('https://cdn-icons-png.flaticon.com/512/3652/3652191.png') no-repeat left 10px center !important; background-size: 20px !important; cursor: pointer; }

        .agency-box { background: #f8fafc; padding: 20px; border-radius: 8px; margin-top: 15px; border: 1px dashed var(--border); }
        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { background: #0f172a; }

        .file-upload { border: 2px dashed var(--accent); padding: 20px; text-align: center; border-radius: 10px; background: #fffdf9; margin-bottom: 20px; }
    </style>
</head>
<body onload="setRegistrationDates()">

    <div class="form-container">
        <div class="form-header">
            <div>
                <h2 style="font-size: 20px;">قيد ملف قضية تحكيمية جديدة</h2>
                <p style="font-size: 12px; color: #64748b;">يجب تعبئة جميع الخانات لضمان قبول الطلب</p>
            </div>
            <img src="logo.png" alt="مُحكّم" style="width: 120px;">
        </div>

        <div class="form-section">
            <h3>وثيقة التحكيم المرفقة</h3>
            <div class="file-upload">
                <p style="font-size: 14px;">يرجى إرفاق <b>اتفاق التحكيم</b> المبرم بين الأطراف (PDF)</p>
                <input type="file" id="agreementFile" class="validate">
            </div>
        </div>

        <div class="form-section">
            <h3>هيئة التحكيم</h3>
            <div class="input-grid">
                <div class="field"><label>المحكم الثاني</label><input type="text" id="arb2" class="validate" placeholder="الاسم الكامل"></div>
                <div class="field"><label>المحكم الثالث</label><input type="text" id="arb3" class="validate" placeholder="الاسم الكامل"></div>
                <div class="field"><label>أمين السر</label><input type="text" id="secretary" class="validate" placeholder="اسم أمين السر"></div>
            </div>
        </div>

        <div class="form-section" id="section-party1">
            <h3>بيانات الطرف الأول (المحتكم)</h3>
            <div class="input-grid">
                <div class="field">
                    <label>نوع الطرف</label>
                    <select id="party1Type" class="validate">
                        <option value="individual">فرد</option>
                        <option value="company">شركة / مؤسسة</option>
                    </select>
                </div>
                <div class="field"><label>اسم المحتكم (الأصيل)</label><input type="text" id="party1Name" class="validate"></div>
            </div>
            <div class="agency-box">
                <p style="font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 10px;">بيانات المحامي / الوكيل</p>
                <div class="input-grid">
                    <div class="field"><label>اسم الوكيل</label><input type="text" id="p1_lawyer_name" class="lawyer-validate-p1"></div>
                    <div class="field"><label>رقم الوكالة</label><input type="text" id="p1_lawyer_id" class="lawyer-validate-p1"></div>
                    <div class="field"><label>تاريخ الوكالة (هجري)</label><input type="text" id="p1_lawyer_date" class="hijri-picker lawyer-validate-p1"></div>
                    <div class="field"><label>رقم الجوال للتبليغ</label><input type="tel" id="p1_lawyer_phone" class="lawyer-validate-p1" placeholder="05XXXXXXXX"></div>
                </div>
            </div>
        </div>

        <div class="form-section" id="section-party2">
            <h3>بيانات الطرف الثاني (المحتكم ضده)</h3>
            <div class="input-grid">
                <div class="field">
                    <label>نوع الطرف</label>
                    <select id="party2Type" class="validate">
                        <option value="individual">فرد</option>
                        <option value="company">شركة / مؤسسة</option>
                    </select>
                </div>
                <div class="field"><label>اسم المحتكم ضده (الأصيل)</label><input type="text" id="party2Name" class="validate"></div>
            </div>
            <div class="agency-box">
                <p style="font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 10px;">بيانات المحامي / الوكيل</p>
                <div class="input-grid">
                    <div class="field"><label>اسم الوكيل</label><input type="text" id="p2_lawyer_name" class="lawyer-validate-p2"></div>
                    <div class="field"><label>رقم الوكالة</label><input type="text" id="p2_lawyer_id" class="lawyer-validate-p2"></div>
                    <div class="field"><label>تاريخ الوكالة (هجري)</label><input type="text" id="p2_lawyer_date" class="hijri-picker lawyer-validate-p2"></div>
                    <div class="field"><label>رقم الجوال للتبليغ</label><input type="tel" id="p2_lawyer_phone" class="lawyer-validate-p2" placeholder="05XXXXXXXX"></div>
                </div>
            </div>
        </div>

        <button class="btn-submit" onclick="finalValidation()">حفظ القضية وإرسال التبليغات</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.rawgit.com/kbwood/calendars/2.1.0/js/jquery.plugin.js"></script>
    <script src="https://cdn.rawgit.com/kbwood/calendars/2.1.0/js/jquery.calendars.js"></script>
    <script src="https://cdn.rawgit.com/kbwood/calendars/2.1.0/js/jquery.calendars.picker.js"></script>
    <script src="https://cdn.rawgit.com/kbwood/calendars/2.1.0/js/jquery.calendars.islamic.js"></script>
    <script src="https://cdn.rawgit.com/kbwood/calendars/2.1.0/js/jquery.calendars.islamic-ar.js"></script>

    <script>
        $(function() {
            var calendar = $.calendars.instance('islamic', 'ar');
            $('.hijri-picker').calendarsPicker({ calendar: calendar, dateFormat: 'yyyy/mm/dd', showAnim: 'fadeIn' });
        });

        function finalValidation() {
            let isValid = true;
            let errorMsg = "";

            // 1. مسح التنسيقات السابقة للخطأ
            $(".validate, .lawyer-validate-p1, .lawyer-validate-p2").removeClass("error");

            // 2. فحص الخانات العامة
            $(".validate").each(function() {
                if ($(this).val() === "" || $(this).val() === null) {
                    $(this).addClass("error");
                    isValid = false;
                    errorMsg = "يرجى تعبئة جميع الخانات الأساسية المحددة باللون الأحمر.";
                }
            });

            // 3. شرط الشركات (الطرف الأول)
            if ($("#party1Type").val() === "company") {
                $(".lawyer-validate-p1").each(function() {
                    if ($(this).val() === "") {
                        $(this).addClass("error");
                        isValid = false;
                        errorMsg = "عذراً، بما أن المحتكم (شركة)، يجب تعبئة كافة بيانات المحامي إجبارياً.";
                    }
                });
            }

            // 4. شرط الشركات (الطرف الثاني)
            if ($("#party2Type").val() === "company") {
                $(".lawyer-validate-p2").each(function() {
                    if ($(this).val() === "") {
                        $(this).addClass("error");
                        isValid = false;
                        errorMsg = "عذراً، بما أن المحتكم ضده (شركة)، يجب تعبئة كافة بيانات المحامي إجبارياً.";
                    }
                });
            }

            // النتيجة النهائية
            if (!isValid) {
                alert(errorMsg);
            } else {
                alert("✅ اكتملت البيانات بنجاح. تم قيد القضية وإرسال رسائل التبليغ لجميع الأطراف.");
                // هنا يتم استدعاء كود الحفظ الحقيقي
            }
        }

        function setRegistrationDates() {
            // كود تعبئة تاريخ اليوم كما في السابق
        }
    </script>
</body>
</html>
