<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُحكَّم | البوابة الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0d2e25; --accent: #c5a059; --bg: #f8fafc; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Almarai', sans-serif; }
        body { display: flex; height: 100vh; background-color: var(--bg); overflow: hidden; }

        /* الجانب الأيمن (نموذج الدخول) */
        .login-section { width: 45%; background: var(--white); display: flex; flex-direction: column; justify-content: center; padding: 0 8%; position: relative; z-index: 10; box-shadow: 20px 0 50px rgba(0,0,0,0.05); overflow-y: auto; }
        
        .form-header { margin-bottom: 40px; text-align: center; }
        .form-title { color: var(--primary); font-size: 32px; font-weight: 800; margin-bottom: 10px; }
        .form-subtitle { color: #64748b; font-size: 15px; }

        /* الحقول والقائمة المنسدلة */
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 14px; font-weight: 700; color: #475569; margin-bottom: 10px; }
        .input-group input, .input-group select { 
            width: 100%; padding: 18px 20px; border: none; background: #f1f5f9; 
            border-radius: 18px; font-size: 15px; outline: none; transition: 0.3s; color: #334155;
        }
        .input-group input:focus, .input-group select:focus { background: #e2e8f0; box-shadow: 0 0 0 4px rgba(197, 160, 89, 0.1); }
        
        .input-group select {
            appearance: none; cursor: pointer;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: left 20px center;
            background-size: 18px;
        }

        .btn { width: 100%; padding: 18px; border-radius: 20px; border: none; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-main { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(13, 46, 37, 0.2); }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(13, 46, 37, 0.3); }

        .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; color: #94a3b8; font-size: 13px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e2e8f0; }
        .divider:not(:empty)::before { margin-left: 15px; }
        .divider:not(:empty)::after { margin-right: 15px; }

        /* الجانب الأيسر (الهوية البصرية) */
        .brand-section { width: 55%; background: linear-gradient(135deg, #0d2e25 0%, #0a221b 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 50px; position: relative; overflow: hidden; }
        .pattern-overlay { position: absolute; top: -20%; right: -20%; width: 150%; height: 150%; background-image: radial-gradient(var(--accent) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.05; transform: rotate(15deg); }

        .brand-content { position: relative; z-index: 10; text-align: center; color: white; max-width: 600px; display: flex; flex-direction: column; align-items: center; }
        
        /* شعار عملاق جداً، بدون مربع أبيض، مع ظل فخم */
        .brand-logo { 
            width: 450px; 
            max-width: 90%;
            height: auto; 
            display: block;
            margin-bottom: 40px;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.5)); 
            transition: transform 0.5s ease;
        }
        .brand-logo:hover {
            transform: scale(1.02); 
        }
        
        .brand-content h2 { font-size: 42px; font-weight: 800; color: var(--accent); margin-bottom: 20px; line-height: 1.4; text-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .brand-content p { font-size: 19px; color: #cbd5e0; line-height: 1.8; font-weight: 300; }
    </style>
</head>
<body>

    <div class="login-section">
        
        <div class="form-header">
            <h2 class="form-title">بوابة الدخول الموحدة</h2>
            <p class="form-subtitle">الرجاء إدخال بياناتك للمتابعة في منصة مُحكَّم</p>
        </div>

        <form onsubmit="handleLogin(event)">
            
            <div class="input-group">
                <label>تحديد الصفة الإجرائية</label>
                <select id="roleSelect" onchange="updateBtnText()">
                    <option value="arbitrator">هيئة التحكيم</option>
                    <option value="secretary">أمين السر</option>
                    <option value="claimant">المحتكم (المدعي)</option>
                    <option value="respondent">المحتكم ضده (المدعى عليه)</option>
                </select>
            </div>

            <div class="input-group">
                <label>رقم الهوية / البريد الإلكتروني</label>
                <input type="text" placeholder="أدخل بيانات الدخول" required>
            </div>
            
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-main" id="loginBtn">دخول بصفتك (هيئة التحكيم)</button>
        </form>

        <div class="divider">أو الدخول السريع المعتمَد</div>

        <button type="button" class="btn" style="background: #0b8258; color: white;" onclick="window.location.href='nafath.html'">
            <span style="font-size: 18px; font-weight: bold;">ن</span> النفاذ الوطني الموحد
        </button>
    </div>

    <div class="brand-section">
        <div class="pattern-overlay"></div>
        <div class="brand-content">
            
            <img src="logo.png" alt="شعار مُحكَّم" class="brand-logo">
            
            <h2>العدالة الرقمية<br>تبدأ من هنا.</h2>
            <p>أول منصة تحكيم سعودية متكاملة تضمن لك السرية التامة، الكفاءة الإجرائية، والموثوقية القانونية.</p>
        </div>
    </div>

    <script>
        // تغيير نص الزر ديناميكياً
        function updateBtnText() {
            const select = document.getElementById('roleSelect');
            const selectedText = select.options[select.selectedIndex].text;
            document.getElementById('loginBtn').innerText = "دخول بصفتك (" + selectedText + ")";
        }

        // التوجيه الذكي للمستخدمين بناءً على صفتهم
        function handleLogin(event) {
            event.preventDefault();
            const role = document.getElementById('roleSelect').value;
            
            if(role === 'arbitrator' || role === 'secretary') {
                // توجيه الهيئة وأمين السر إلى لوحة التحكم الرئيسية
                window.location.href = 'dashboard.html';
            } else {
                // توجيه الخصوم إلى بوابة الأطراف المبسطة
                window.location.href = 'party-portal.html';
            }
        }
    </script>
</body>
</html>
