<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | منصة مُحكَّم</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0d2e25; --accent: #c5a059; --bg: #f8fafc;
            --white: #ffffff; --text: #334155; --shadow: 0 20px 50px rgba(0,0,0,0.04);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Almarai', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

        /*Sidebar*/
        aside {
            width: 280px; background: var(--primary); color: white;
            position: fixed; height: 100vh; right: 0; padding: 40px 25px;
            display: flex; flex-direction: column; z-index: 100;
        }
        .logo { text-align: center; margin-bottom: 40px; }
        .logo img { width: 160px; height: auto; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        .nav-item {
            padding: 16px 20px; border-radius: 20px; margin-bottom: 12px; cursor: pointer;
            display: flex; align-items: center; gap: 15px; font-size: 15px; color: #94a3b8; transition: 0.4s;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { color: var(--accent); font-weight: 700; }

        /*Main Content*/
        main { margin-right: 280px; flex-grow: 1; padding: 60px 80px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; }
        .btn-main {
            background: var(--primary); color: white; border: none; padding: 18px 40px;
            border-radius: 22px; font-weight: 800; cursor: pointer; transition: 0.3s;
            box-shadow: 0 15px 30px rgba(13, 46, 37, 0.2);
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(13, 46, 37, 0.3); }

        .stat-box { background: var(--white); padding: 35px; border-radius: 35px; box-shadow: var(--shadow); transition: 0.3s; }
        .stat-box:hover { transform: translateY(-5px); }

        /*Table*/
        .table-card { background: var(--white); border-radius: 40px; padding: 40px; box-shadow: var(--shadow); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: right; color: #94a3b8; font-size: 13px; padding: 20px; border-bottom: 1px solid #f1f5f9; }
        td { padding: 25px 20px; border-bottom: 1px solid #f8fafc; font-size: 14px; }
        .case-id { background: #f1f5f9; color: var(--primary); padding: 8px 15px; border-radius: 12px; font-weight: 800; font-family: monospace; }

        /*Floating Library*/
        .lib-btn {
            position: fixed; left: 40px; bottom: 40px; background: var(--white);
            width: 70px; height: 70px; border-radius: 25px; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            cursor: pointer; font-size: 28px; z-index: 1000; transition: 0.3s; border: 1px solid #eee;
        }

        /*Modal*/
        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal.active { display: flex; }
        .modal-card { background: var(--white); width: 850px; padding: 50px; border-radius: 45px; max-height: 90vh; overflow-y: auto; }
        
        .input-group { margin-bottom: 22px; }
        .input-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 10px; color: #64748b; }
        .input-group input, .input-group select { width: 100%; padding: 16px 20px; border: none; background: #f1f5f9; border-radius: 18px; outline: none; transition: 0.3s; }
        .input-group input:focus { background: #e2e8f0; }
    </style>
</head>
<body>

    <div class="lib-btn" onclick="alert('تفعيل المكتبة القانونية...')">📖</div>

    <aside>
        <div class="logo">
            <img src="logo.png" alt="Logo">
        </div>
        <div class="nav-item active">📊 الرئيسية</div>
        <div class="nav-item">📁 القضايا</div>
        <div class="nav-item">📅 المواعيد</div>
    </aside>

    <main>
        <div class="top-row">
            <div>
                <h2 style="font-size: 30px; font-weight: 800; color: var(--primary);">مرحباً، د. عبدالله</h2>
                <p style="color: #64748b;">نظام إدارة التحكيم الذكي - متوافق مع رؤية 2030</p>
            </div>
            <button class="btn-main" onclick="openModal()">+ تسجيل قضية جديدة</button>
        </div>

        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-bottom: 50px;">
            <div class="stat-box"><span style="color:#94a3b8">القضايا النشطة</span><h2 style="font-size:35px; color:var(--primary)">12</h2></div>
            <div class="stat-box"><span style="color:#94a3b8">أحكام صدرت</span><h2 style="font-size:35px; color:var(--primary)">145</h2></div>
            <div class="stat-box"><span style="color:#94a3b8">إجمالي المطالبات</span><h2 style="font-size:24px; color:var(--primary)">12.5M ر.س</h2></div>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr><th>الرقم الموحد</th><th>الأطراف</th><th>الحالة</th><th>الإدارة</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td><span class="case-id">2610000457</span></td>
                        <td>شركة الأفق ضد مؤسسة البناء</td>
                        <td><span style="color:var(--accent); font-weight:800">● تبادل مذكرات</span></td>
                        <td><button onclick="location.href='caseroom.html'" style="background:none; border:none; color:var(--primary); font-weight:800; cursor:pointer;">دخول الغرفة ←</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div class="modal" id="modal">
        <div class="modal-card">
            <h2 style="color:var(--primary); margin-bottom:35px; font-weight:800">تأسيس ملف قضية (10 خانات)</h2>
            <form onsubmit="handleCreation(event)">
                <div class="input-group"><label>موضوع النزاع</label><input type="text" required></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px">
                    <div class="input-group">
                        <label>نوع الطرف</label>
                        <select onchange="adjust(this)">
                            <option value="1">سعودي (1)</option>
                            <option value="2">مقيم (2)</option>
                            <option value="7">شركة (7)</option>
                        </select>
                    </div>
                    <div class="input-group"><label>رقم الهوية / السجل</label><input type="text" id="hid" pattern="1[0-9]{9}" maxlength="10" required></div>
                </div>
                <div class="input-group"><label>رقم الجوال للتبليغ</label><input type="tel" pattern="05[0-9]{8}" maxlength="10" placeholder="05xxxxxxxx" required></div>
                <button type="submit" class="btn-main" style="width:100%; margin-top:20px;">تأكيد التأسيس وحفظ البيانات</button>
            </form>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('modal').classList.add('active'); }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        function adjust(s) { document.getElementById('hid').pattern = s.value + "[0-9]{9}"; }
        function handleCreation(e) {
            e.preventDefault();
            const id = "26" + Math.floor(10000000 + Math.random() * 90000000);
            alert("تم التأسيس بنجاح! رقم القضية الموحد: " + id);
            closeModal();
        }
    </script>
</body>
</html>
