<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إصدار الحكم | مُحكَّم</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0d2e25; --accent: #c5a059; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Almarai', sans-serif; }
        body { background: var(--bg); color: #334155; padding-bottom: 120px; }
        
        header { background: var(--primary); padding: 20px 60px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 100; }
        .logo-mini { display: flex; align-items: center; gap: 15px; }
        .logo-mini img { width: 50px; border-radius: 8px; }

        .container { max-width: 900px; margin: 50px auto; }
        .award-card { background: white; padding: 60px; border-radius: 50px; box-shadow: 0 30px 60px rgba(0,0,0,0.05); }
        
        h2 { color: var(--primary); font-weight: 800; margin-bottom: 40px; border-right: 5px solid var(--accent); padding-right: 15px; }
        
        .form-group { margin-bottom: 35px; }
        label { display: block; font-size: 14px; font-weight: 800; margin-bottom: 15px; color: var(--primary); }
        textarea { width: 100%; min-height: 180px; padding: 25px; border-radius: 30px; background: #f8fafc; border: none; font-size: 15px; line-height: 1.8; outline: none; }
        
        .footer-actions { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 25px; display: flex; justify-content: center; gap: 20px; border-top: 1px solid #eee; }
        .btn { padding: 15px 45px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-p { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <header>
        <div class="logo-mini">
            <img src="logo.png" alt="Logo">
            <span style="font-weight:800; color:var(--accent);">مُحكَّم</span>
        </div>
        <a href="dashboard.html" style="color:white; text-decoration:none; font-size:13px;">العودة للوحة التحكم ←</a>
    </header>

    <div class="container">
        <div class="award-card">
            <h2>صك الحكم النهائي</h2>
            <form>
                <div class="form-group"><label>أولاً: الوقائع</label><textarea required></textarea></div>
                <div class="form-group"><label>ثانياً: الأسباب</label><textarea required></textarea></div>
                <div class="form-group"><label>ثالثاً: منطوق الحكم</label><textarea style="background:#fffdf7; border:1px solid var(--accent);" required></textarea></div>
            </form>
        </div>
    </div>

    <div class="footer-actions">
        <button class="btn" style="background:#eee;">حفظ مسودة</button>
        <button class="btn btn-p" onclick="alert('تم إرسال الحكم للتوقيع الرقمي عبر نفاذ')">اعتماد وتوقيع (نفاذ)</button>
    </div>

</body>
</html>
